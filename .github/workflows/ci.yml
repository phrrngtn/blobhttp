name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        run: uv sync --python 3.12

      - name: Build extension (Unix)
        if: runner.os != 'Windows'
        run: make GEN=ninja

      - name: Build extension (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: make GEN=ninja

      - name: Run sqllogictest (offline — no server needed)
        run: |
          uv run python -m duckdb_sqllogictest \
            --test-dir test/sql \
            --external-extension build/release/http_client.duckdb_extension \
            --file-path test/sql/http_client_local.test

      - name: Start local test server (Unix)
        if: runner.os != 'Windows'
        run: |
          uv run python test/flask_concurrency_server.py &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8444/health > /dev/null && break
            sleep 0.5
          done

      - name: Start local test server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath uv -ArgumentList "run","python","test/flask_concurrency_server.py"
          for ($i = 0; $i -lt 30; $i++) {
            try { Invoke-WebRequest -Uri http://localhost:8444/health -UseBasicParsing -ErrorAction Stop | Out-Null; break } catch { Start-Sleep -Milliseconds 500 }
          }

      - name: Run sqllogictest (server tests)
        run: |
          uv run python -m duckdb_sqllogictest \
            --test-dir test/sql \
            --external-extension build/release/http_client.duckdb_extension \
            --file-path test/sql/http_client_server.test

      - name: Run pytest (parallel execution verification)
        run: uv run pytest test/test_integration.py -v

      - name: Stop test server (Unix)
        if: always() && runner.os != 'Windows'
        run: pkill -f flask_concurrency_server || true

      - name: Stop test server (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: Get-Process -Name python -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -match 'flask_concurrency_server' } | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: http_client-${{ runner.os }}
          path: build/release/http_client.duckdb_extension
